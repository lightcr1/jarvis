<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jarvis Console</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #0f1622;
      --panel-border: #1f2a3a;
      --panel-highlight: rgba(255, 255, 255, 0.04);
      --text: #e6edf3;
      --muted: #9aa4b2;
      --accent: #4f8cff;
      --accent-strong: #2f6cf6;
      --ok: #2dd4bf;
      --danger: #f87171;
      --shadow: 0 18px 40px rgba(4, 8, 16, 0.35);
    }
    body {
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial;
      margin: 0;
      background: radial-gradient(1200px 600px at 15% -10%, rgba(79, 140, 255, 0.12), transparent 60%), var(--bg);
      color: var(--text);
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 24px 20px 30px; }
    h1 { font-size: 22px; margin: 8px 0 18px; letter-spacing: 0.04em; }
    .card {
      background: linear-gradient(180deg, rgba(17, 24, 39, 0.94), rgba(13, 18, 30, 0.96));
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 16px;
      margin: 14px 0;
      box-shadow: var(--shadow);
    }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    button {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }
    button:active { transform: translateY(1px); }
    #talk { background: var(--accent); color: white; box-shadow: 0 8px 18px rgba(79, 140, 255, 0.24); }
    #talk.rec { background: var(--danger); box-shadow: 0 8px 18px rgba(248, 113, 113, 0.22); }
    #send { background: var(--ok); color: #052b2f; }
    #clear { background: transparent; color: var(--text); border: 1px solid var(--panel-border); }
    input, textarea {
      width: 100%;
      background: rgba(9, 14, 24, 0.7);
      color: var(--text);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 12px;
      transition: border-color 0.12s ease, box-shadow 0.12s ease;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.2);
    }
    textarea { min-height: 100px; resize: vertical; }
    .muted { color: var(--muted); font-size: 13px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; white-space: pre-wrap; }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(13, 20, 35, 0.7);
      border: 1px solid var(--panel-border);
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    #reply {
      background: linear-gradient(135deg, rgba(79, 140, 255, 0.15), rgba(13, 20, 35, 0.9));
      border: 1px solid rgba(79, 140, 255, 0.3);
      border-radius: 14px;
      padding: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Jarvis Console <span class="pill" id="status">idle</span></h1>
    <div class="card">
      <div class="row">
        <button id="talk">🎙️ Hold to talk</button>
        <button id="send">Send</button>
        <button id="clear">Clear</button>
        <span class="muted">iPhone: Safari → Share → “Add to Home Screen”</span>
      </div>
      <p class="muted" style="margin:10px 0 6px;">Transkript</p>
      <textarea id="text" placeholder="Sprich oder tippe hier..."></textarea>
    </div>

    <div class="card">
      <p class="muted" style="margin:0 0 6px;">Jarvis reply</p>
      <div class="mono" id="reply">—</div>
    </div>

    <div class="card">
      <p class="muted" style="margin:0 0 6px;">Debug</p>
      <div class="mono" id="debug">—</div>
    </div>
  </div>

<script>
const statusEl = document.getElementById("status");
const talkBtn = document.getElementById("talk");
const sendBtn = document.getElementById("send");
const clearBtn = document.getElementById("clear");
const textEl = document.getElementById("text");
const replyEl = document.getElementById("reply");
const debugEl = document.getElementById("debug");

let mediaRecorder = null;
let chunks = [];

function setStatus(s) {
  statusEl.textContent = s;
}

async function postJSON(url, body) {
  const r = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`${url} -> ${r.status} ${await r.text()}`);
  return await r.json();
}

async function postAudio(url, blob) {
  const fd = new FormData();
  fd.append("file", blob, "audio.webm");
  const r = await fetch(url, { method: "POST", body: fd });
  if (!r.ok) throw new Error(`${url} -> ${r.status} ${await r.text()}`);
  return await r.json();
}

async function ensureMic() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const mime = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
    ? "audio/webm;codecs=opus"
    : "audio/webm";
  mediaRecorder = new MediaRecorder(stream, { mimeType: mime });

  mediaRecorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    try {
      setStatus("transcribing");
      const blob = new Blob(chunks, { type: mediaRecorder.mimeType });
      chunks = [];
      debugEl.textContent = `Recorded: ${Math.round(blob.size/1024)} KB (${mediaRecorder.mimeType})`;

      const stt = await postAudio("/stt", blob);
      textEl.value = stt.text || "";
      setStatus("chatting");

      const chat = await postJSON("/chat", { text: textEl.value });
      replyEl.textContent = chat.reply || "—";
      debugEl.textContent = chat.data ? JSON.stringify(chat.data, null, 2) : "—";
      setStatus("idle");
    } catch (err) {
      setStatus("error");
      replyEl.textContent = "—";
      debugEl.textContent = String(err);
      talkBtn.classList.remove("rec");
    }
  };
}

talkBtn.addEventListener("pointerdown", async (e) => {
  e.preventDefault();
  try {
    if (!mediaRecorder) await ensureMic();
    talkBtn.classList.add("rec");
    setStatus("recording");
    chunks = [];
    mediaRecorder.start();
  } catch (err) {
    setStatus("error");
    debugEl.textContent = "Mic error: " + err;
  }
});

talkBtn.addEventListener("pointerup", (e) => {
  e.preventDefault();
  if (mediaRecorder && mediaRecorder.state === "recording") {
    talkBtn.classList.remove("rec");
    setStatus("stopping");
    mediaRecorder.stop();
  }
});

talkBtn.addEventListener("pointercancel", () => {
  if (mediaRecorder && mediaRecorder.state === "recording") {
    talkBtn.classList.remove("rec");
    setStatus("stopping");
    mediaRecorder.stop();
  }
});

sendBtn.addEventListener("click", async () => {
  try {
    setStatus("chatting");
    const chat = await postJSON("/chat", { text: textEl.value });
    replyEl.textContent = chat.reply || "—";
    debugEl.textContent = chat.data ? JSON.stringify(chat.data, null, 2) : "—";
    setStatus("idle");
  } catch (err) {
    setStatus("error");
    debugEl.textContent = String(err);
  }
});

clearBtn.addEventListener("click", () => {
  textEl.value = "";
  replyEl.textContent = "—";
  debugEl.textContent = "—";
  setStatus("idle");
});
</script>
</body>
</html>
