# JARVIS — Nginx reverse proxy configuration
#
# For LAN use: relies on mkcert-issued cert at /etc/jarvis/ssl/.
# For public domain with Let's Encrypt, replace the ssl_certificate / ssl_certificate_key
# lines with the paths printed by certbot (typically /etc/letsencrypt/live/<domain>/...),
# update the server_name directive to your FQDN, and run:
#   certbot --nginx -d <domain>
# or use scripts/setup-https-letsencrypt.sh which automates this.

# Redirect all HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name jarvissrv01 jarvissrv01.local localhost;

    return 301 https://$host$request_uri;
}

# HTTPS — main server block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name jarvissrv01 jarvissrv01.local localhost;

    # -------------------------------------------------------
    # SSL — mkcert (LAN) cert paths.
    # For Let's Encrypt, replace with:
    #   /etc/letsencrypt/live/<domain>/fullchain.pem
    #   /etc/letsencrypt/live/<domain>/privkey.pem
    # -------------------------------------------------------
    ssl_certificate     /etc/jarvis/ssl/cert.pem;
    ssl_certificate_key /etc/jarvis/ssl/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # -------------------------------------------------------
    # Upload size — audio files for STT can be up to ~20 MB
    # -------------------------------------------------------
    client_max_body_size 50M;

    # -------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               text/javascript application/x-javascript text/xml application/xml
               application/xml+rss;
    gzip_min_length 1024;
    gzip_vary on;

    # -------------------------------------------------------
    # Security headers
    # -------------------------------------------------------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    # -------------------------------------------------------
    # WebSocket upgrade map — used by /ws/* endpoints:
    #   /ws/status          JarvisStatusHub
    #   /ws/alerts          Live alert stream
    #   /ws/home-assistant  HA entity state push
    # -------------------------------------------------------
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # Keep WebSocket connections alive
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # -------------------------------------------------------
    # All other traffic → Uvicorn on localhost:8000
    # -------------------------------------------------------
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # Required for SSE streaming chat responses
        proxy_buffering    off;
        proxy_cache        off;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }
}
