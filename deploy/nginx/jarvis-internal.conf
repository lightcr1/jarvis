# JARVIS — Internal LAN access (HTTPS, self-signed cert)
# Traffic: LAN device → nginx (10.10.40.100:443) → JARVIS (127.0.0.1:8000)
# Cert lives at /etc/nginx/ssl/jarvis-internal.{crt,key}

server {
    listen 10.10.40.100:443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/jarvis-internal.crt;
    ssl_certificate_key /etc/nginx/ssl/jarvis-internal.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 64m;
    client_body_timeout  60s;

    # WebSocket
    location ~ ^/ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SSE (chat streaming)
    location /chat/stream {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        add_header         X-Accel-Buffering no;
    }

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}
