# JARVIS — Nginx config for Cloudflare Tunnel deployment
#
# Traffic flow: Internet → Cloudflare → cloudflared tunnel → nginx (127.0.0.1:80) → JARVIS
#
# No SSL cert needed here — Cloudflare terminates TLS.
# Nginx only listens on loopback so it is unreachable except via the tunnel.

server {
    listen 127.0.0.1:80;
    server_name _;

    # ── Real IP from Cloudflare ──────────────────────────────────────────────
    # Restore the visitor's real IP from the CF-Connecting-IP header.
    # See: https://developers.cloudflare.com/fundamentals/get-started/reference/http-request-headers/
    set_real_ip_from 127.0.0.1;
    real_ip_header   CF-Connecting-IP;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"            always;
    add_header X-Frame-Options         "DENY"              always;
    add_header Referrer-Policy         "strict-origin"     always;

    # ── Upload / request limits ──────────────────────────────────────────────
    client_max_body_size 64m;       # allow audio uploads (STT)
    client_body_timeout  60s;

    # ── Static frontend ──────────────────────────────────────────────────────
    location /assets/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-Proto https;
        expires            7d;
        add_header         Cache-Control "public, immutable";
    }

    # ── WebSocket endpoints ──────────────────────────────────────────────────
    location ~ ^/ws/ {
        proxy_pass             http://127.0.0.1:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header       X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header       X-Forwarded-Proto https;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    # ── SSE (chat streaming) ─────────────────────────────────────────────────
    location /chat/stream {
        proxy_pass             http://127.0.0.1:8000;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header       X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header       X-Forwarded-Proto https;
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     300s;
        add_header             X-Accel-Buffering no;
    }

    # ── Everything else ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}
