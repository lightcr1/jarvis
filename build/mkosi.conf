[Output]
Format=disk
ImageId=jarvis
ImageVersion=1.0

[Distribution]
Distribution=ubuntu
Release=24.04
Repositories=main,universe

[Packages]
Packages=python3 python3-venv python3-pip systemd rsync xserver-xorg xinit openbox chromium chromium-browser x11-xserver-utils

[Content]
CopyFiles=./:/opt/jarvis
CopyFiles=./systemd/jarvis-backend.service:/etc/systemd/system/jarvis-backend.service
CopyFiles=./systemd/jarvis-kiosk.service:/etc/systemd/system/jarvis-kiosk.service
CopyFiles=./systemd/jarvis.service:/etc/systemd/system/jarvis.service
CopyFiles=./systemd/first-boot-wizard.service:/etc/systemd/system/first-boot-wizard.service
CopyFiles=./systemd/first-boot-wizard.service:/etc/systemd/system/multi-user.target.wants/first-boot-wizard.service
CopyFiles=./scripts/first_boot_wizard.sh:/usr/local/bin/jarvis-first-boot

[Build]
Bootable=yes
