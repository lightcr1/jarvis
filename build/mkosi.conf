[Output]
Format=iso
ImageId=jarvis
ImageVersion=1.0

[Distribution]
Distribution=ubuntu
Release=24.04
Repositories=main,universe

[Packages]
Packages=python3 python3-venv python3-pip systemd sudo rsync chromium-browser xorg openbox xinit x11-xserver-utils dbus-user-session

[Content]
CopyFiles=./:/opt/jarvis
CopyFiles=./systemd/jarvis.service:/etc/systemd/system/jarvis.service
CopyFiles=./systemd/first-boot-wizard.service:/etc/systemd/system/first-boot-wizard.service
CopyFiles=./systemd/first-boot-wizard.service:/etc/systemd/system/multi-user.target.wants/first-boot-wizard.service
CopyFiles=./scripts/first_boot_wizard.sh:/usr/local/bin/jarvis-first-boot
CopyFiles=./scripts/setup_kiosk.sh:/usr/local/bin/jarvis-setup-kiosk
CopyFiles=./systemd/jarvis-kiosk-setup.service:/etc/systemd/system/jarvis-kiosk-setup.service
CopyFiles=./systemd/jarvis-kiosk-setup.service:/etc/systemd/system/multi-user.target.wants/jarvis-kiosk-setup.service

[Build]
Bootable=yes
