name: Build Jarvis Boot Image

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mkosi systemd-container \
            python3 python3-pip python3-venv \
            git jq unzip xz-utils \
            qemu-utils

      - name: Make build script executable
        run: chmod +x scripts/build-image.sh

      - name: Build image
        run: |
          set -euxo pipefail
          cd "$(realpath "$GITHUB_WORKSPACE")"
          pwd -P
          ./scripts/build-image.sh


      - name: Find build artifacts
        id: artifacts
        run: |
          set -euxo pipefail
          mkdir -p artifacts
          # suche typische Image-Artefakte
          find . -maxdepth 6 -type f \( \
            -name "*.iso" -o -name "*.raw" -o -name "*.img" -o -name "*.qcow2" \
          \) -print -exec cp -v {} artifacts/ \;
          # zur Sicherheit: falls mkosi in einem Output-Ordner landet
          find . -maxdepth 6 -type f -name "mkosi.*" -print || true
          ls -la artifacts || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-boot-image
          path: artifacts/*
          if-no-files-found: error
