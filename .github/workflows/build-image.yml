name: Build Jarvis Boot Image

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            mkosi systemd-container \
            python3 python3-pip python3-venv \
            git jq unzip xz-utils qemu-utils

      - name: Make build script executable
        run: chmod +x scripts/build-image.sh

      - name: Build image
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE"

          # mkosi workspace MUSS ausserhalb des repos liegen (sonst bricht mkosi ab)
          export MKOSI_WS="${RUNNER_TEMP:-/tmp}/mkosi-workspace"
          mkdir -p "$MKOSI_WS"

          # Viele Setups lesen dieses env; falls nicht, setzen wir es später im Script per Flag.
          export MKOSI_WORKSPACE_DIRECTORY="$MKOSI_WS"

          ./scripts/build-image.sh

      - name: Collect artifacts
        if: always()
        run: |
          set -euxo pipefail
          mkdir -p artifacts
          # Suche nach typischen mkosi Outputs
          find . -maxdepth 8 -type f \( \
            -name "*.iso" -o -name "*.raw" -o -name "*.img" -o -name "*.qcow2" \
          \) -print -exec cp -v {} artifacts/ \; || true
          ls -la artifacts || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-boot-image
          path: artifacts/*
          if-no-files-found: error
