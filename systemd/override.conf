[Service]
Environment="LLM_PROVIDER=gemini"
Environment="STT_PROVIDER=local"
Environment="TTS_PROVIDER=local"

# Gemini (optional für Chat)
Environment="GEMINI_API_KEY=..."
Environment="GEMINI_MODEL=gemini-2.5-flash"

# OpenAI (optional fallback)
Environment="OPENAI_API_KEY=..."
Environment="OPENAI_MODEL=gpt-4.1-mini"

# Piper Voice (lokal)
Environment="PIPER_VOICE_MODEL=/opt/piper-voices/en_US-amy-medium.onnx"

# Token
Environment="JARVIS_PASSPHRASE=deinpasswort"
Environment="JARVIS_TOKEN_TTL_MIN=20"
